const fmt = (n,dec=0) => {if(n==null) return "—"; if(n>=1e9) return "$"+(n/1e9).toFixed(1)+"B"; if(n>=1e6) return "$"+(n/1e6).toFixed(0)+"M"; if(n>=1e3) return "$"+(n/1e3).toFixed(0)+"K"; return "$"+n.toFixed(dec)};
const fmtB = (n) => {if(n==null) return "—"; if(n>=1e9) return (n/1e9).toFixed(2)+"B"; if(n>=1e6) return (n/1e6).toFixed(0)+"M"; return n.toLocaleString()};
const pct = (n) => n==null?"—":n+"%";
const ragColor = (s) => s==="On track"||s==="On budget"||s==="Green"||s==="Complete"||s==="N/A"?"#22c55e":s==="At risk"||s==="Lagging"||s==="Amber"||s==="Overspend"||s==="Monitor"?"#f59e0b":"#ef4444";
const ragClass = (s) => s==="On track"||s==="On budget"||s==="Green"||s==="N/A"?"badge-green":s==="At risk"||s==="Lagging"||s==="Amber"?"badge-amber":"badge-red";
const statusBadge = (s) => {const c=ragClass(s); return <span className={`badge ${c}`}>{s}</span>};
const sevColor = (s) => s==="Critical"?"#ef4444":s==="High"?"#f59e0b":s==="Medium"||s==="Med"?"#3b82f6":"#22c55e";

const avgSPI = (PROJECTS.reduce((a,p)=>a+p.spiVal,0)/PROJECTS.length).toFixed(2);
const totalRisks = PROJECTS.reduce((a,p)=>a+(p.risks?.length||0),0);
const highSevRisks = PROJECTS.reduce((a,p)=>a+(p.risks?.filter(r=>r.severity==="Critical"||r.severity==="High").length||0),0);

const inDesign = PROJECTS.filter(p=>p.phase==="Design").length;

        {(p.risks||[]).slice(0,3).map((r,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #1e293b",fontSize:11}}>
            <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontWeight:800,color:"#64748b"}}>{r.id}</span><span style={{maxWidth:160}}>{r.desc.substring(0,40)}</span></div>
            <div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{color:sevColor(r.severity),fontWeight:700,fontSize:10}}>{r.severity}</span><span style={{fontSize:9,color:"#64748b"}}>{r.schedImpact?.replace("+","")}</span></div>
          </div>
        ))}
        {p.risks?.some(r=>r.severity==="Critical") && <div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:4,padding:"6px 10px",marginTop:8,fontSize:10,color:"#fca5a5"}}>⚠ {p.risks.filter(r=>r.severity==="Critical").length} high-severity risk(s). Requires immediate executive escalation.</div>}
      </div>

      <div className="section-card">
        <SectionTitle icon="✅" title="Actions & decisions required"/>
        {(p.actions||[]).map((a,i)=>(
          <div key={i} style={{padding:"6px 0",borderBottom:"1px solid #1e293b"}}>
            <div style={{display:"flex",gap:6,alignItems:"flex-start"}}><input type="checkbox" checked={a.done} readOnly style={{marginTop:2}}/><div><div style={{fontSize:11,color:"#e2e8f0"}}>{a.text}</div><div style={{fontSize:9,color:"#64748b"}}>{a.owner && <span className="badge badge-blue" style={{fontSize:8,marginRight:4}}>{a.owner}</span>}<span style={{color:a.due?.includes("URGENT")?"#ef4444":"#f59e0b"}}>{a.due}</span></div></div></div>
          </div>
        ))}
        {(!p.actions||p.actions.length===0) && <div style={{color:"#64748b",fontSize:11,textAlign:"center",padding:12}}>No pending actions</div>}
      </div>
    </div>
  </div>
);

// ═══════════════════════════════════════════════════════════════
//  LEGEND OVERLAY
// ═══════════════════════════════════════════════════════════════
const LegendOverlay = ({onClose}) => (
  <div className="legend-overlay fade-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div><h2 style={{fontSize:18,fontWeight:800}}>Dashboard legend</h2><div style={{fontSize:12,color:"#64748b"}}>How to read every color, icon, and indicator</div></div>
      <button onClick={onClose} style={{background:"none",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer"}}>✕</button>
    </div>
    <div style={{marginBottom:20}}>
      <h3 style={{fontSize:12,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Overall RAG Status</h3>
      <p style={{fontSize:10,color:"#64748b",marginBottom:8}}>Drives the left border color and badge on every project card</p>
      {[["On track — Green","SPI ≥ 0.95 · Budget ≤ +2% · No critical path delay · TRIR < 1.0","#22c55e"],["At risk — Amber","SPI 0.85–0.94 · Budget +2 to +5% · Schedule float < 10d · TRIR 1.0–1.5","#f59e0b"],["Critical — Red","SPI < 0.85 · Budget > +5% · Off critical path · TRIR > 1.5 · LLE blocked","#ef4444"]].map(([t,d,c])=>(
        <div key={t} style={{marginBottom:8,padding:"8px 12px",background:"#0f172a",borderRadius:6,borderLeft:`3px solid ${c}`}}>
          <div style={{fontSize:12,fontWeight:700,color:c}}>{t}</div>
          <div style={{fontSize:10,color:"#94a3b8"}}>{d}</div>
        </div>
      ))}
    </div>
    <div style={{marginBottom:20}}>
      <h3 style={{fontSize:12,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Project Phase</h3>
      <p style={{fontSize:10,color:"#64748b",marginBottom:8}}>Shown as a badge on each card. Progress bar shows % design or % construction complete</p>
      {[["Construction","Active construction on site. TRIR, Gantt, and site safety metrics are active. SPI sourced from Smart PM / P6."],["Design","Pre-construction — design and procurement phases. TRIR shows N/A. Progress = % design packages released."]].map(([t,d])=>(
        <div key={t} style={{marginBottom:6,padding:"6px 10px",background:"#0f172a",borderRadius:4}}>
          <div style={{fontSize:11,fontWeight:700}}>{t}</div>
          <div style={{fontSize:10,color:"#94a3b8"}}>{d}</div>
        </div>
      ))}
    </div>
    <div style={{marginBottom:20}}>
      <h3 style={{fontSize:12,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Delivery Type</h3>
      <p style={{fontSize:10,color:"#64748b",marginBottom:8}}>Defines the scope of Surestone's responsibility on the project</p>
      {[["Turnkey","Full design-build. Surestone is responsible for complete facility delivery including interior works, MEP, and final handover."],["Core & Shell","Structure and base building envelope only. Client takes responsibility for interior works and tenant improvements."]].map(([t,d])=>(
        <div key={t} style={{marginBottom:6,padding:"6px 10px",background:"#0f172a",borderRadius:4}}>
          <div style={{fontSize:11,fontWeight:700}}>{t}</div>
          <div style={{fontSize:10,color:"#94a3b8"}}>{d}</div>
        </div>
      ))}
    </div>
    <div>
      <h3 style={{fontSize:12,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Card Domain Icons — S · $ · SF</h3>
      <p style={{fontSize:10,color:"#64748b",marginBottom:8}}>The three icons at the bottom of every project card give an at-a-glance health check across the three most critical domains. Each is independently RAG-rated.</p>
      {[["S — Schedule","Based on SPI (Schedule Performance Index) and critical path float. Source: Smart PM + Primavera P6"],["$ — Cost / Budget","Based on CPI, EAC vs BAC variance, and contingency burn rate. Source: Coupa + Smart PM"],["SF — Safety","Based on TRIR (Total Recordable Incident Rate), IFD streak, and near-miss trends. Source: Procore"]].map(([t,d])=>(
        <div key={t} style={{marginBottom:6,padding:"6px 10px",background:"#0f172a",borderRadius:4}}>
          <div style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>{t}</div>
          <div style={{fontSize:10,color:"#94a3b8"}}>{d}</div>
        </div>
      ))}
    </div>
  </div>
);

// ═══════════════════════════════════════════════════════════════
//  APP — MAIN NAVIGATION
// ═══════════════════════════════════════════════════════════════
const App = () => {
  const [view, setView] = useState("portfolio"); // portfolio | project | executive | onepager
  const [selectedProject, setSelectedProject] = useState(PROJECTS[0]);
  const [showLegend, setShowLegend] = useState(false);

  const handleSelectProject = (p) => { setSelectedProject(p); setView("project"); };

  return (
    <div style={{minHeight:"100vh",background:"#0a0e17"}}>
      {/* Top Nav Bar */}
      <div style={{background:"#0f1629",borderBottom:"1px solid #1e293b",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0"}}>
            <div style={{width:32,height:32,borderRadius:6,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#fff"}}>SD</div>
            <div><div style={{fontSize:14,fontWeight:800,color:"#e2e8f0"}}>{COMPANY}</div><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>{COMPANY_SUB}</div></div>
          </div>
          <div style={{display:"flex",gap:0,marginLeft:16}}>
            <div className={`nav-tab ${view==="portfolio"?"active":""}`} onClick={()=>setView("portfolio")}>Portfolio status</div>
            <div className={`nav-tab ${view==="project"?"active":""}`} onClick={()=>setView("project")}>Project — {selectedProject.code}</div>
            <div className={`nav-tab ${view==="executive"?"active":""}`} onClick={()=>setView("executive")}>Executive management</div>
            <div className={`nav-tab ${view==="onepager"?"active":""}`} onClick={()=>setView("onepager")}>Exec one-pager · {selectedProject.code}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:11,color:"#64748b"}}>Data as of: {DATA_DATE}</span>
          <span style={{display:"flex",gap:4,fontSize:10}}>
            <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e"}}/>On track</span>
            <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:"50%",background:"#f59e0b"}}/>At risk</span>
            <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:"50%",background:"#ef4444"}}/>Critical</span>
          </span>
          <span style={{fontSize:11,color:"#94a3b8",cursor:"pointer",textDecoration:"underline"}} onClick={()=>setShowLegend(true)}>Legend ↗</span>
          <span style={{fontSize:11,color:"#94a3b8",cursor:"pointer"}} onClick={()=>window.location.reload()}>↻ Refresh</span>
          <div style={{width:28,height:28,borderRadius:"50%",background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14}}>☀</div>
        </div>
      </div>

      {/* Blue progress line under nav */}
      <div style={{height:3,background:"#1e293b"}}><div style={{height:"100%",width:`${avgComplete}%`,background:"linear-gradient(90deg,#3b82f6,#22c55e)",transition:"width 1s ease"}}/></div>

      {/* Main Content */}
      <div style={{padding:"16px 0"}}>
        {view === "portfolio" && <PortfolioStatus onSelectProject={handleSelectProject}/>}
        {view === "project" && <ProjectDetail project={selectedProject}/>}
        {view === "executive" && <ExecutiveManagement/>}
        {view === "onepager" && <ExecOnePager project={selectedProject}/>}
      </div>

      {/* Footer */}
      <div style={{borderTop:"1px solid #1e293b",padding:"10px 24px",display:"flex",justifyContent:"space-between",fontSize:10,color:"#475569"}}>
        <span>© {COMPANY} 2026 — Project Management Dashboard v3.0 — Confidential</span>
        <span>↗ Executive view &nbsp; 📄 Export PDF</span>
      </div>

      {/* Legend Overlay */}
      {showLegend && <LegendOverlay onClose={()=>setShowLegend(false)}/>}
      {showLegend && <div onClick={()=>setShowLegend(false)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",zIndex:99}}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
