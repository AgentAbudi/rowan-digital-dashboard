const fmt = (n) => {
  if(n>=1e9) return '$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return '$'+(n/1e6).toFixed(0)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(0)+'K';
  return '$'+n;
};
const fmtFull = (n) => '$'+n.toLocaleString();
const pct = (n) => (n*100).toFixed(1)+'%';
const statusColor = (s) => s==='On Track'?'#10b981':s==='At Risk'?'#f59e0b':'#ef4444';
const statusBg = (s,dark) => s==='On Track'?(dark?'bg-emerald-900/40 text-emerald-400 border-emerald-700':'bg-emerald-50 text-emerald-700 border-emerald-200'):s==='At Risk'?(dark?'bg-amber-900/40 text-amber-400 border-amber-700':'bg-amber-50 text-amber-700 border-amber-200'):(dark?'bg-red-900/40 text-red-400 border-red-700':'bg-red-50 text-red-700 border-red-200');
const indexColor = (v) => v>=0.95?'#10b981':v>=0.85?'#f59e0b':'#ef4444';
const indexBg = (v,dark) => v>=0.95?(dark?'text-emerald-400':'text-emerald-600'):v>=0.85?(dark?'text-amber-400':'text-amber-600'):(dark?'text-red-400':'text-red-600');

// 芒聰聙芒聰聙芒聰聙 GAUGE COMPONENT 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
const Gauge = ({value, label, size=120, color}) => {
  const r = size/2-10;
  const c = Math.PI*r;
  const v = Math.min(Math.max(value,0),2);
  const offset = c - (v/2)*c;
  const col = color || indexColor(value);
  return (
    <div className="flex flex-col items-center">
      <svg width={size} height={size/2+15} viewBox={`0 0 ${size} ${size/2+15}`}>
        <path d={`M 10,${size/2+5} A ${r},${r} 0 0,1 ${size-10},${size/2+5}`} fill="none" stroke="#374151" strokeWidth="8" strokeLinecap="round"/>
        <path d={`M 10,${size/2+5} A ${r},${r} 0 0,1 ${size-10},${size/2+5}`} fill="none" stroke={col} strokeWidth="8" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset} style={{transition:'stroke-dashoffset 1s ease'}}/>
        <text x={size/2} y={size/2} textAnchor="middle" fill={col} fontSize={size/4.5} fontWeight="700">{value.toFixed(2)}</text>
      </svg>
      <span className="text-xs font-medium mt-1 opacity-70">{label}</span>
    </div>
  );
};

  const totalOpenIssues = PROJECTS.reduce((s,p)=>s+p.openIssues,0);
  const forecastVariance = totalBudget - totalForecast;
  const COLORS = ['#10b981','#f59e0b','#ef4444'];

  // Aggregated monthly data for portfolio
  const portfolioMonths = ['Nov 25','Dec 25','Jan 26','Feb 26','Mar 26','Apr 26'];

    return {...row,spi:+(row.ev/row.pv).toFixed(3),cpi:+(row.ev/row.ac).toFixed(3)};

  // Top 5 risks across portfolio
  const allRisks = PROJECTS.flatMap(p=>p.risks.map(r=>({...r,project:p.name,score:r.prob*r.impact}))).sort((a,b)=>b.score-a.score).slice(0,5);

          {label:'Avg CPI',val:avgCPI.toFixed(2),sub:avgCPI>=0.95?'Under Budget':'Monitor',color:indexColor(avgCPI),icon:'C'},
          {label:'Forecast Variance',val:fmt(Math.abs(forecastVariance)),sub:forecastVariance>=0?'Under Budget':'Over Budget',color:forecastVariance>=0?'#10b981':'#ef4444',icon:'V'},
          {label:'TRIR (Avg)',val:avgTRIR.toFixed(2),sub:`${totalIncidents} total incidents`,color:avgTRIR<=0.8?'#10b981':'#f59e0b',icon:'H'},
          {label:'MW Capacity',val:`${totalMWDelivered}/${totalCapacity}`,sub:`${((totalMWDelivered/totalCapacity)*100).toFixed(0)}% delivered`,icon:'E'}
        ].map((k,i)=>(
          <div key={i} className={`${card} border rounded-xl p-4 kpi-hover`}>
            <div className="flex items-center justify-between mb-2">
              <span className={`text-xs font-medium ${txt}`}>{k.label}</span>
              <span className={`w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold ${d?'bg-slate-700 text-blue-400':'bg-blue-50 text-blue-600'}`}>{k.icon}</span>
            </div>
            <div className="text-xl font-bold" style={{color:k.color||'inherit'}}>{k.val}</div>
            <div className={`text-xs ${txtMuted} mt-1`}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Row 2: Status Distribution + Performance Trend */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div className={`${card} border rounded-xl p-5`}>
          <h3 className={`font-bold ${txtH} mb-4`}>Project Status Distribution</h3>
          <div className="flex items-center gap-6">
            <div style={{width:180,height:180}}>
              <ResponsiveContainer>
                <PieChart>
                  <Pie data={[{name:'On Track',value:onTrack},{name:'At Risk',value:atRisk},{name:'Delayed',value:delayed}]} dataKey="value" cx="50%" cy="50%" innerRadius={45} outerRadius={75} paddingAngle={4}>
                    {[0,1,2].map(i=><Cell key={i} fill={COLORS[i]}/>)}
                  </Pie>
                  <Tooltip contentStyle={tooltipStyle}/>
                </PieChart>
              </ResponsiveContainer>
            </div>
            <div className="space-y-3">
              <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-emerald-500"/><span className={`text-sm ${txtH}`}>{onTrack} On Track ({((onTrack/7)*100).toFixed(0)}%)</span></div>
              <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-amber-500"/><span className={`text-sm ${txtH}`}>{atRisk} At Risk ({((atRisk/7)*100).toFixed(0)}%)</span></div>
              <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-red-500"/><span className={`text-sm ${txtH}`}>{delayed} Delayed ({((delayed/7)*100).toFixed(0)}%)</span></div>
            </div>
          </div>
        </div>
        <div className={`${card} border rounded-xl p-5`}>
          <h3 className={`font-bold ${txtH} mb-4`}>Portfolio SPI / CPI Trend</h3>
          <ResponsiveContainer width="100%" height={200}>
            <LineChart data={portfolioEVM}>
              <CartesianGrid strokeDasharray="3 3" stroke={d?'#334155':'#e5e7eb'}/>
              <XAxis dataKey="month" stroke={d?'#9ca3af':'#6b7280'} fontSize={11}/>
              <YAxis stroke={d?'#9ca3af':'#6b7280'} fontSize={11} domain={[0.85,1.05]}/>
              <Tooltip contentStyle={tooltipStyle}/>
              <Legend/>
              <Line type="monotone" dataKey="spi" name="SPI" stroke="#3b82f6" strokeWidth={2} dot={{r:3}}/>
              <Line type="monotone" dataKey="cpi" name="CPI" stroke="#10b981" strokeWidth={2} dot={{r:3}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Row 3: Budget Overview + Cash Flow */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div className={`${card} border rounded-xl p-5`}>
          <h3 className={`font-bold ${txtH} mb-4`}>Budget vs Actual by Project</h3>
          <ResponsiveContainer width="100%" height={250}>
            <BarChart data={PROJECTS.map(p=>({name:p.code,budget:p.budget/1e6,actual:p.actual/1e6,forecast:p.forecast/1e6}))}>
              <CartesianGrid strokeDasharray="3 3" stroke={d?'#334155':'#e5e7eb'}/>
              <XAxis dataKey="name" stroke={d?'#9ca3af':'#6b7280'} fontSize={10}/>
              <YAxis stroke={d?'#9ca3af':'#6b7280'} fontSize={11} tickFormatter={v=>`$${v}M`}/>
              <Tooltip contentStyle={tooltipStyle} formatter={(v)=>`$${v.toFixed(0)}M`}/>
              <Legend/>
              <Bar dataKey="budget" name="Budget" fill="#3b82f6" radius={[3,3,0,0]}/>
              <Bar dataKey="actual" name="Actual" fill="#f59e0b" radius={[3,3,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className={`${card} border rounded-xl p-5`}>
          <h3 className={`font-bold ${txtH} mb-4`}>Portfolio Earned Value</h3>
          <ResponsiveContainer width="100%" height={250}>
            <AreaChart data={portfolioEVM}>
              <CartesianGrid strokeDasharray="3 3" stroke={d?'#334155':'#e5e7eb'}/>
              <XAxis dataKey="month" stroke={d?'#9ca3af':'#6b7280'} fontSize={11}/>
              <YAxis stroke={d?'#9ca3af':'#6b7280'} fontSize={11} tickFormatter={v=>fmt(v)}/>
              <Tooltip contentStyle={tooltipStyle} formatter={v=>fmtFull(v)}/>
              <Legend/>
              <Area type="monotone" dataKey="pv" name="Planned Value" stroke="#3b82f6" fill="#3b82f622" strokeWidth={2}/>
              <Area type="monotone" dataKey="ev" name="Earned Value" stroke="#10b981" fill="#10b98122" strokeWidth={2}/>
              <Area type="monotone" dataKey="ac" name="Actual Cost" stroke="#f59e0b" fill="#f59e0b22" strokeWidth={2}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Row 4: Top Risks + Project Health */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className={`${card} border rounded-xl p-5`}>
          <h3 className={`font-bold ${txtH} mb-4`}>Top 5 Portfolio Risks</h3>
          <div className="space-y-2">
            {allRisks.map((r,i)=>(
              <div key={i} className={`flex items-start gap-3 p-3 rounded-lg ${d?'bg-slate-700/30':'bg-gray-50'}`}>
                <RiskBadge score={r.score}/>
                <div className="flex-1 min-w-0">
                  <p className={`text-sm ${txtH}`}>{r.desc}</p>
                  <p className={`text-xs ${txtMuted}`}>{r.project} &middot; {r.status}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className={`${card} border rounded-xl p-5`}>
          <h3 className={`font-bold ${txtH} mb-4`}>Project Health Summary</h3>
          <div className="space-y-3">
            {PROJECTS.map(p=>(
              <div key={p.id} className={`flex items-center gap-3`}>
                <span className="w-3 h-3 rounded-full" style={{background:statusColor(p.status)}}/>
                <span className={`text-sm ${txtH} w-36 truncate`}>{p.name}</span>
                <div className="flex-1"><ProgressBar value={p.progress} color={statusColor(p.status)} height={6} showLabel={false}/></div>
                <span className={`text-xs font-mono w-10 text-right ${indexBg(p.spi,d)}`}>{p.spi.toFixed(2)}</span>
                <span className={`text-xs font-mono w-10 text-right ${indexBg(p.cpi,d)}`}>{p.cpi.toFixed(2)}</span>
                <span className={`text-xs w-12 text-right ${txt}`}>{p.progress}%</span>
              </div>
            ))}
          </div>
          <div className={`mt-3 pt-2 border-t ${d?'border-slate-700':'border-gray-200'} flex gap-6 text-xs ${txtMuted}`}>
            <span>SPI</span><span>CPI</span><span>Progress</span>
          </div>
        </div>
      </div>
    </div>
  );
};

// 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
const App = () => {
  const [layer,setLayer] = useState(0); // 0=projects, 1=detail, 2=executive
  const [selectedProject,setSelectedProject] = useState(null);
  const [dark,setDark] = useState(true);

  const handleSelectProject = (p) => { setSelectedProject(p); setLayer(1); };
  const handleGoExecutive = () => setLayer(2);
  const handleBackToProjects = () => { setLayer(0); setSelectedProject(null); };

  return (
    <div className={dark?'bg-slate-900 text-gray-100 min-h-screen':'bg-gray-50 text-gray-900 min-h-screen'}>
      {/* Top Nav Bar */}
      <div className={`fixed top-0 left-0 right-0 z-50 ${dark?'bg-slate-800/95 border-slate-700':'bg-white/95 border-gray-200'} border-b backdrop-blur-sm`}>
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-gradient-to-br from-blue-600 to-blue-700 rounded-lg flex items-center justify-center text-white font-bold text-sm">RD</div>
            <div>
              <h1 className={`text-base font-bold ${dark?'text-white':'text-gray-900'}`}>Rowan Digital</h1>
              <p className={`text-xs ${dark?'text-gray-400':'text-gray-500'}`}>Project Management Dashboard</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            {/* Layer indicators */}
            <div className="hidden md:flex items-center gap-1 text-xs">
              <button onClick={handleBackToProjects} className={`px-3 py-1.5 rounded-lg font-medium transition-colors ${layer===0?(dark?'bg-blue-600/20 text-blue-400':'bg-blue-100 text-blue-700'):(dark?'text-gray-400 hover:text-gray-200':'text-gray-500 hover:text-gray-700')}`}>Projects</button>
              <span className={dark?'text-gray-600':'text-gray-300'}>/</span>
              <button disabled={!selectedProject} onClick={()=>{if(selectedProject)setLayer(1)}} className={`px-3 py-1.5 rounded-lg font-medium transition-colors ${layer===1?(dark?'bg-blue-600/20 text-blue-400':'bg-blue-100 text-blue-700'):(dark?'text-gray-400 hover:text-gray-200':'text-gray-500 hover:text-gray-700')} ${!selectedProject?'opacity-40 cursor-not-allowed':''}`}>PM Detail</button>
              <span className={dark?'text-gray-600':'text-gray-300'}>/</span>
              <button onClick={handleGoExecutive} className={`px-3 py-1.5 rounded-lg font-medium transition-colors ${layer===2?(dark?'bg-blue-600/20 text-blue-400':'bg-blue-100 text-blue-700'):(dark?'text-gray-400 hover:text-gray-200':'text-gray-500 hover:text-gray-700')}`}>Executive</button>
            </div>
            {/* Theme toggle */}
            <button onClick={()=>setDark(!dark)} className={`w-9 h-9 rounded-lg flex items-center justify-center transition-colors ${dark?'bg-slate-700 hover:bg-slate-600 text-yellow-400':'bg-gray-200 hover:bg-gray-300 text-blue-600'}`}>
              {dark?'\u2600\uFE0F':'\uD83C\uDF19'}
            </button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="pt-16">
        {layer===0 && <Layer0_ProjectHealth onSelectProject={handleSelectProject} onGoExecutive={handleGoExecutive} dark={dark}/>}
        {layer===1 && selectedProject && <Layer1_ProjectDetail project={selectedProject} onBack={handleBackToProjects} dark={dark}/>}
        {layer===2 && <Layer2_Executive onBack={handleBackToProjects} dark={dark}/>}
      </div>

      {/* Footer */}
      <div className={`text-center py-6 text-xs ${dark?'text-gray-600':'text-gray-400'}`}>
        Rowan Digital &copy; 2026 &middot; Project Management Dashboard v2.0 &middot; Confidential
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
